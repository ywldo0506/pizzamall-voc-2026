<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피자몰 셀별 VOC 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--main:#456e2a;--main-mid:#5c8f3a;--main-light:#dbe8cc;--main-pale:#f5f9f0;--main-dark:#2e4a1c;--main-bar:#7fae55;--danger:#DC2626;--danger-light:#FEF2F2;--warning:#D97706;--border:#dfe8d3;--bg:#f6f9f2;--white:#FFFFFF;--text:#26311d;--text-muted:#6f8560;--text-sub:#a3b494;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.header{background:var(--white);border-bottom:2px solid var(--main-light);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(69,110,42,.15);}
.hlogo{width:8px;height:36px;background:linear-gradient(180deg,var(--main-mid),var(--main-dark));border-radius:4px;}
.htitle{font-size:18px;font-weight:800;color:var(--main-dark);}
.hsub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.badges{display:flex;gap:8px;}
.badge{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;}
.bg2{background:var(--main-light);color:var(--main-dark);}
.br{background:var(--danger-light);color:var(--danger);}

.brand-bar{background:var(--main-dark);padding:14px 28px;position:sticky;top:73px;z-index:99;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.brand-bar-label{color:rgba(255,255,255,.65);font-size:12px;font-weight:600;margin-right:4px;}
.brand-toggle{display:flex;gap:8px;flex:1;min-width:280px;}
.brand-tbtn{flex:1;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 16px;cursor:pointer;font-family:inherit;transition:all .15s;color:rgba(255,255,255,.75);text-align:left;}
.brand-tbtn .btn-name{font-size:14px;font-weight:800;}
.brand-tbtn .btn-sub{font-size:10px;opacity:.8;margin-top:2px;}
.brand-tbtn:hover{background:rgba(255,255,255,.14);}
.brand-tbtn.active{background:var(--main-mid);border-color:var(--main-mid);color:#fff;}

.month-tabs{background:var(--main);display:flex;overflow-x:auto;position:sticky;top:129px;z-index:98;}
.mtab{padding:10px 24px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:600;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;text-align:center;}
.mtab:hover{color:#fff;}
.mtab.active{color:#fff;border-bottom-color:var(--main-light);}
.tab-cum{border:1.5px dashed var(--main);border-radius:8px 8px 0 0;background:var(--main-pale);margin:6px 4px 0 8px;padding-top:8px !important;}
.tab-cum.active{background:var(--main-light);}
.tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto;}
.tab{padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;color:var(--text-muted);transition:all .15s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab .tl{font-size:13px;font-weight:600;}
.tab .td{font-size:10px;color:var(--text-sub);}
.tab:hover{color:var(--main);}
.tab.active{color:var(--main-dark);border-bottom-color:var(--main);background:var(--main-pale);}
.tab.active .tl{font-weight:800;}
.content{padding:20px 28px;max-width:1200px;}
.section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:20px;}
.stitle{font-size:14px;font-weight:800;color:var(--main-dark);margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ssub{font-size:11px;color:var(--text-muted);font-weight:400;background:var(--bg);padding:2px 8px;border-radius:10px;}
.chart-wrap{position:relative;height:260px;}
.cell-selector{display:flex;gap:10px;margin-bottom:0;flex-wrap:wrap;}
.cell-btn{flex:1;min-width:160px;background:var(--white);border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.cb-l{display:flex;align-items:center;gap:10px;}
.cb-dot{width:10px;height:10px;border-radius:50%;background:var(--border);}
.cb-name{font-size:15px;font-weight:800;color:var(--text-muted);}
.cb-r{text-align:right;}
.cb-avg{font-size:18px;font-weight:800;color:var(--text-muted);}
.cb-sub{font-size:10px;color:var(--text-sub);margin-top:2px;}
.cell-btn.active{border-color:var(--main);background:var(--main-pale);}
.cell-btn.active .cb-dot{background:var(--main);}
.cell-btn.active .cb-name,.cell-btn.active .cb-avg{color:var(--main-dark);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--main-pale);padding:10px 12px;font-weight:700;font-size:11px;color:var(--main-dark);text-align:left;border-bottom:2px solid var(--main-light);}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--main-pale);cursor:pointer;}
.snm{font-weight:700;}
.ln{font-weight:800;color:var(--danger);}
.tn{color:var(--text-muted);font-size:12px;}
.bw{display:flex;align-items:center;gap:8px;}
.bb{height:7px;border-radius:4px;background:var(--main-bar);}
.pn{font-size:12px;font-weight:800;min-width:38px;}
.pr{color:var(--danger);}.po{color:var(--warning);}.pg{color:var(--main-dark);}
.ab{color:var(--danger);font-weight:700;}.ao{color:var(--warning);font-weight:700;}.ag{color:var(--main-dark);font-weight:700;}
.dcu{font-size:11px;font-weight:700;color:var(--danger);}.dcd{font-size:11px;font-weight:700;color:var(--main-dark);}.dce{font-size:11px;color:var(--text-sub);}
.rvb{font-size:11px;color:var(--main-dark);background:var(--main-light);border:none;padding:3px 8px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
.overlay.open{display:block;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:500px;background:var(--white);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 30px rgba(0,0,0,.14);}
.drawer.open{transform:translateX(0);}
.dh{padding:18px 22px;border-bottom:2px solid var(--main-light);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:10;}
.dh h3{font-size:14px;font-weight:800;color:var(--main-dark);flex:1;min-width:0;margin-right:8px;}
.dwt{font-size:11px;font-weight:700;background:var(--main-light);color:var(--main-dark);padding:3px 9px;border-radius:10px;white-space:nowrap;}
.dcb{cursor:pointer;background:none;border:none;font-size:22px;color:var(--text-muted);padding:2px 8px;border-radius:6px;flex-shrink:0;}
.db{padding:16px 22px;}
.rv{border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;}
.rm{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
.sc{font-size:12px;font-weight:800;padding:2px 9px;border-radius:12px;}
.sc1{background:#FEE2E2;color:#991B1B;}.sc2{background:#FEF9C3;color:#78350F;}
.rd{font-size:11px;color:var(--text-muted);}
.rt{font-size:13px;line-height:1.7;word-break:keep-all;}
.norv{text-align:center;padding:48px 20px;color:var(--text-muted);}
@media(max-width:768px){.cell-selector{flex-direction:column;}.drawer{width:100%;}.content{padding:14px 16px;}.brand-toggle{flex-direction:column;}}
</style>
</head>

const CELL_KEYS = ['1셀','2셀','3셀','4셀'];
const BRAND_KEYS = ['피자몰V2','피자몰'];
const BRAND_LABELS = {'피자몰V2':'피자몰V2','피자몰':'피자몰 뷔페'};
const MONTH_ORDER = ['m1','m2','m3','m4','m5','m6','m7'];

const labelPlugin={
  id:'customLabels',
  afterDraw(chart){
    const ctx=chart.ctx; ctx.save();
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di); if(meta.hidden) return;
      meta.data.forEach((el,i)=>{
        const val=ds.data[i]; if(val===0||val==null) return;
        if(ds.type==='bar'){
          const bH=el.base-el.y; if(bH<14) return;
          ctx.font='bold 11px Pretendard,-apple-system,sans-serif';
          ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(val+'%',el.x,el.y+bH/2);
        } else {
          ctx.font='bold 11px Pretendard,-apple-system,sans-serif';
          ctx.fillStyle='#2e4a1c'; ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(String(val),el.x,el.y-8);
        }
      });
    });
    ctx.restore();
  }
};
Chart.register(labelPlugin);

let curBrand='피자몰V2',curMonth='m1',curWeek='w1',curCell='1셀';
const charts={};

function getPrev(wk,weeks){if(wk==='cum')return null;const i=weeks.indexOf(wk);return i>0?weeks[i-1]:null;}
function pc(p){return p>=5?'pr':p>=3?'po':'pg';}
function ac(a){return a<4.4?'ab':a<4.6?'ao':'ag';}

function buildBrandBar(){
  document.getElementById('brand-toggle').innerHTML = BRAND_KEYS.map(b=>{
    const h1=DATA.h1_badge_by_brand[b];
    return `<button class="brand-tbtn${b===curBrand?' active':''}" data-brand="${b}">
      <div class="btn-name">${BRAND_LABELS[b]}</div>
      <div class="btn-sub">상반기 평균 ${h1.avg} · ${h1.pct}</div>
    </button>`;
  }).join('');
}

function buildMonthTabs(){
  document.getElementById('month-tabs').innerHTML = MONTH_ORDER.map(mk=>{
    const cfg = DATA.months[mk];
    const bBadge = cfg.badgeByBrand[curBrand];
    const bTotal = cfg.totalCountByBrand[curBrand];
    let sub = `총 ${bTotal.toLocaleString()}건 · 평균 ${bBadge.avg}`;
    if(mk===curMonth && curWeek==='cum'){
      sub = `${cfg.realWeekCount}주차 누적 · 평균 ${bBadge.avg}`;
    }
    return `<div class="mtab${mk===curMonth?' active':''}" data-month="${mk}"><div>${cfg.label}</div><div style="font-size:10px;opacity:.75;margin-top:2px">${sub}</div></div>`;
  }).join('');
}

const H1_MONTHS = ['m1','m2','m3','m4','m5','m6'];
function buildTabs(){
  const cfg=DATA.months[curMonth];
  document.getElementById('tabs').innerHTML=cfg.weeks.map((wk,i)=>{
    const isCum = wk==='cum';
    return `<div class="tab${wk===curWeek?' active':''}${isCum?' tab-cum':''}" data-week="${wk}">
      <span class="tl">${isCum?'📊 ':''}${cfg.weekLabels[i]}</span><span class="td">${cfg.weekDates[wk]}</span>
    </div>`;
  }).join('');
  if(H1_MONTHS.includes(curMonth)){
    const h1=DATA.h1_badge_by_brand[curBrand];
    document.getElementById('hbadges').innerHTML=
      `<div class="badge bg2">${BRAND_LABELS[curBrand]} ${h1.avg}<span style="font-weight:400;font-size:10px;margin-left:4px;opacity:.75">(상반기 누적)</span></div><div class="badge br">${h1.pct}</div>`;
  } else {
    const mb=cfg.badgeByBrand[curBrand];
    document.getElementById('hbadges').innerHTML=
      `<div class="badge bg2">${BRAND_LABELS[curBrand]} ${mb.avg}<span style="font-weight:400;font-size:10px;margin-left:4px;opacity:.75">(${cfg.label} 누적·${cfg.realWeekCount}주차까지)</span></div><div class="badge br">${mb.pct}</div>`;
  }
}

function render(){
  document.querySelectorAll('#brand-toggle .brand-tbtn').forEach(t=>{
    t.classList.toggle('active', t.dataset.brand===curBrand);
  });
  document.querySelectorAll('#month-tabs .mtab').forEach(t=>{
    t.classList.toggle('active', t.dataset.month===curMonth);
  });
  document.querySelectorAll('#tabs .tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.week===curWeek);
  });
  const cfg=DATA.months[curMonth];
  const wk=curWeek;
  const prev=getPrev(wk,cfg.weeks);
  const wLabel=cfg.weekLabels[cfg.weeks.indexOf(wk)];
  const brandLabel=BRAND_LABELS[curBrand];

  const chartAvgs=CELL_KEYS.map(c=>cfg.brandCellWeek[c][curBrand][wk].avg);
  const chartPcts=CELL_KEYS.map(c=>cfg.brandCellWeek[c][curBrand][wk].pct);
  const chartTotals=CELL_KEYS.map(c=>cfg.brandCellWeek[c][curBrand][wk].total);
  const chartLows=CELL_KEYS.map(c=>cfg.brandCellWeek[c][curBrand][wk].low);
  const y2max=Math.max(Math.ceil(Math.max(...chartPcts)/0.35),8);

  const cellBtns=CELL_KEYS.map(c=>{
    const cw=cfg.brandCellWeek[c][curBrand][wk];
    const storeCnt=DATA.cell_stores[c][curBrand].length;
    return `<button class="cell-btn${c===curCell?' active':''}" onclick="selectCell('${c}')">
      <div class="cb-l"><div class="cb-dot"></div><div class="cb-name">${c}</div></div>
      <div class="cb-r"><div class="cb-avg">${cw.avg}점</div><div class="cb-sub">1-2점 ${cw.pct}% · 매장 ${storeCnt}개</div></div>
    </button>`;
  }).join('');

  const stores=[...DATA.cell_stores[curCell][curBrand]].sort((a,b)=>cfg.storeWeek[b][wk].p-cfg.storeWeek[a][wk].p);
  let rows='';
  if(stores.length===0){
    rows = `<tr><td colspan="4" style="text-align:center;color:var(--text-sub);padding:24px">이 셀에는 ${brandLabel} 매장이 없습니다</td></tr>`;
  }
  stores.forEach(store=>{
    const sw=cfg.storeWeek[store][wk], sp=prev?cfg.storeWeek[store][prev]:null;
    const bw=Math.min(sw.p/20*90,90);
    let dc='';
    if(prev&&sp){
      const d=+(sw.p-sp.p).toFixed(1);
      dc=d>0?`<span class="dcu">▲${Math.abs(d)}%p</span>`:d<0?`<span class="dcd">▼${Math.abs(d)}%p</span>`:`<span class="dce">-</span>`;
    }
    rows+=`<tr onclick="openDrawer('${store.replace(/'/g,"\\'")}','${wk}')">
      <td class="snm">${store}</td>
      <td><span class="ln">${sw.l}건</span><span class="tn"> / ${sw.t}건</span></td>
      <td><div class="bw"><div class="bb" style="width:${bw}px"></div><span class="pn ${pc(sw.p)}">${sw.p}%</span>${dc}</div></td>
      <td><span class="${ac(sw.a)}">${sw.a}</span></td>
    </tr>`;
  });

  const cur=cfg.brandCellWeek[curCell][curBrand][wk];
  const prevCur=prev?cfg.brandCellWeek[curCell][curBrand][prev]:null;
  let dH='';
  if(prevCur){
    const r=+(cur.pct-prevCur.pct).toFixed(1);
    const up=r>0;
    dH=r===0?'<span style="color:var(--text-sub);font-size:11px">= 전주 동일</span>'
      :`<span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:${up?'#FEE2E2':'var(--main-light)'};color:${up?'var(--danger)':'var(--main-dark)'};display:inline-block">${up?'▲':'▼'} ${Math.abs(r)}%p</span>`;
  } else dH='<span style="color:var(--text-sub);font-size:11px">— (비교 없음)</span>';

  document.getElementById('main-content').innerHTML=`
    <div class="section">
      <div class="stitle">📊 [${brandLabel}] ${wLabel} 셀별 평균 평점 &amp; 1-2점 비율<span class="ssub">${CELL_KEYS.length}개 셀 비교 · 아래에서 셀 선택 시 매장 테이블 변경</span></div>
      <div class="chart-wrap"><canvas id="cell-chart"></canvas></div>
    </div>
    <div class="section">
      <div class="stitle" style="margin-bottom:12px">셀 선택 <span class="ssub">${brandLabel} 기준</span></div>
      <div class="cell-selector">${cellBtns}</div>
    </div>
    <div class="section">
      <div class="stitle">🏢 ${wLabel} ${curCell} · ${brandLabel} 매장별 현황<span class="ssub">저평점 비율순 · 행 클릭 시 리뷰</span>
        <span style="margin-left:auto;font-size:12px;font-weight:400">${curCell} 저평점 ${cur.pct}% ${dH}</span>
      </div>
      <table>
        <thead><tr><th>매장명</th><th>저평점</th><th>저평점 비율${prev?' (▲▼ 전주)':''}</th><th>평균 평점</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  setTimeout(()=>drawChart(wk,chartAvgs,chartPcts,chartTotals,chartLows,y2max),30);
}

function drawChart(wk,avgs,pcts,totals,lows,y2max){
  const canvas=document.getElementById('cell-chart'); if(!canvas) return;
  const cid=curBrand+curMonth+wk;
  Object.keys(charts).forEach(k=>{charts[k].destroy();delete charts[k];});
  charts[cid]=new Chart(canvas.getContext('2d'),{
    data:{
      labels:CELL_KEYS,
      datasets:[
        {type:'bar',label:'1-2점 비율(%)',data:pcts,
          backgroundColor:'rgba(127,174,85,0.85)',borderColor:'rgba(69,110,42,0.9)',
          borderWidth:1.5,borderRadius:6,yAxisID:'y2',order:2,barPercentage:0.5,categoryPercentage:0.65},
        {type:'line',label:'평균 평점',data:avgs,
          borderColor:'#2e4a1c',backgroundColor:'rgba(127,174,85,0.09)',
          borderWidth:2.5,pointBackgroundColor:'#456e2a',pointRadius:6,pointHoverRadius:8,
          tension:0.3,yAxisID:'y1',order:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:500},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:16}},
        tooltip:{callbacks:{afterBody:(items)=>{const i=items[0].dataIndex;return[`총 리뷰: ${totals[i]}건`,`저평점: ${lows[i]}건`];}}}
      },
      scales:{
        y1:{type:'linear',position:'left',min:3.5,max:5.2,title:{display:true,text:'평균 평점',font:{size:10},color:'#2e4a1c'},ticks:{font:{size:10},color:'#2e4a1c',stepSize:0.2}},
        y2:{type:'linear',position:'right',min:0,max:y2max,title:{display:true,text:'1-2점 비율(%)',font:{size:10},color:'#456e2a'},ticks:{font:{size:10},callback:v=>v+'%',color:'#456e2a'},grid:{drawOnChartArea:false}},
        x:{ticks:{font:{size:13},color:'#26311d',padding:6}}
      }
    }
  });
}

function selectCell(c){curCell=c;render();}

function openDrawer(store,wk){
  const cfg=DATA.months[curMonth];
  const reviews=(cfg.reviews[store]||{})[wk]||[];
  document.getElementById('d-title').textContent=store;
  document.getElementById('d-wtag').textContent=cfg.weekLabels[cfg.weeks.indexOf(wk)]+' 저평점 리뷰';
  document.getElementById('d-body').innerHTML=reviews.length===0
    ?'<div class="norv">✅ 해당 주차 저평점 리뷰 없음</div>'
    :reviews.map(r=>`<div class="rv"><div class="rm"><span class="sc sc${r.score}">${r.score}점</span><span class="rd">${r.date}</span></div><div class="rt">${r.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

window.addEventListener('DOMContentLoaded',()=>{
  buildBrandBar();
  buildMonthTabs();
  buildTabs();
  render();

  document.getElementById('brand-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('.brand-tbtn');
    if(!btn) return;
    curBrand = btn.dataset.brand;
    buildBrandBar();
    buildMonthTabs();
    buildTabs();
    render();
  });

  document.getElementById('tabs').addEventListener('click', e=>{
    const tab = e.target.closest('.tab');
    if(!tab) return;
    curWeek = tab.dataset.week;
    render();
  });
  document.getElementById('month-tabs').addEventListener('click', e=>{
    const t = e.target.closest('.mtab');
    if(!t) return;
    curMonth = t.dataset.month;
    curWeek = 'w1';
    buildMonthTabs();
    buildTabs();
    render();
  });
});
</script>
</body>
</html>
